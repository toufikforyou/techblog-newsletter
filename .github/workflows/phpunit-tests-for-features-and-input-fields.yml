name: PHPUnit Tests For The Laravel Workflow

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  phpunit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3, curl, tokenizer, xml, ctype, json
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare app key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test